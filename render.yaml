services:
  - type: web
    name: worklog-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIGEST_TRIGGER_TOKEN
        generateValue: true
      - key: DISCORD_TOKEN
        sync: false
      - key: WORKLOG_CHANNEL_ID
        sync: false
      - key: DIGEST_CHANNEL_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

  - type: worker
    name: worklog-bot
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m bot.main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: WORKLOG_CHANNEL_ID
        sync: false
      - key: REVIEW_CHANNEL_ID
        sync: false
      - key: DIGEST_CHANNEL_ID
        sync: false
      - key: DIGEST_POST_HOUR_UTC
        value: 14
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: EMBEDDING_DIMENSIONS
        value: 1536
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
