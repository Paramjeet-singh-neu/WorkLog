services:
  - type: web
    name: worklog-api
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIGEST_TRIGGER_TOKEN
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: WORKLOG_CHANNEL_ID
        sync: false
      - key: DIGEST_CHANNEL_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: EMBEDDING_PROVIDER
        sync: false
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
